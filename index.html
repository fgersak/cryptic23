<!DOCTYPE html>

<html lang="hr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Birthday cryptic</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #eaf3ff;
  --text: #111;
  --muted: #6b7280;
  --border: rgba(17,24,39,0.12);
}

body {
  margin: 0;
  font-family: 'Baloo 2', cursive;
  display: flex;
  justify-content: center;
  background: var(--bg);
}

.container {
  max-width: 640px;
  padding: 44px 20px;
  text-align: center;
}

h1 {
  font-size: 36px;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
}

.timer {
  font-size: 12px;
  color: var(--muted);
}

.puzzle {
  font-size: 20px;
  margin: 24px 0;
  padding: 18px;
  background: #fff;
  border: 2px solid #000;
  border-radius: 14px;
}

.grid {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
}

.box {
  width: 45px;
  height: 45px;
  font-size: 20px;
  text-align: center;
  text-transform: uppercase;
  border: 2px solid #5e5e5e;
  border-radius: 10px;
}

.box.correct {
  background: #81fa5cdc;
  border-color: #49792d;
}

button {
  margin: 6px;
  padding: 9px 14px;
  border-radius: 999px;
  cursor: pointer;
}

.modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.25);
}

.modal-content {
  background: white;
  padding: 18px;
  border-radius: 14px;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  50% { transform: translateX(3px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}
</style>

</head>

const INTERVAL = 6 * 60 * 60 * 1000;

function getCurrentPuzzle() {
  const now = Date.now();
  const ref = new Date(2026, 3, 16, 0, 0, 0).getTime();
  const index = Math.floor((now - ref) / INTERVAL) % puzzles.length;

  return {
    puzzle: puzzles[index],
    nextChange: (Math.floor((now - ref) / INTERVAL) + 1) * INTERVAL + ref
  };
}

let puzzleData;

function loadPuzzle() {
  const data = getCurrentPuzzle();
  puzzleData = data.puzzle;

  document.getElementById("puzzle").innerText = puzzleData.text;
  createGrid(puzzleData.answer);
  startTimer(data.nextChange);
}

function createGrid(answer) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  currentIndex = 0;

  for (let i = 0; i < answer.length; i++) {

    if (answer[i] === " ") {
      const spacer = document.createElement("div");
      spacer.style.width = "44px";
      spacer.style.height = "52px";
      grid.appendChild(spacer);
      continue;
    }

    const input = document.createElement("input");
    input.className = "box";
    input.maxLength = 1;

    input.addEventListener("input", (e) => {
      e.target.value = e.target.value.toUpperCase();

      const boxes = document.querySelectorAll(".box");
      const index = Array.from(boxes).indexOf(input);

      // 👉 idi na sljedeći
      if (index < boxes.length - 1) {
        currentIndex = index + 1;
        focusBox(currentIndex);
      }
    });

    input.addEventListener("keydown", (e) => {
      const boxes = document.querySelectorAll(".box");
      const index = Array.from(boxes).indexOf(input);

      if (e.key === "Enter") {
        checkAnswer();
      }

      if (e.key === "Backspace") {
        if (input.value === "") {
          e.preventDefault();

          if (index > 0) {
            boxes[index - 1].value = "";
            currentIndex = index - 1;
            focusBox(currentIndex);
          }
        }
      }
    });

    grid.appendChild(input);
  }

  focusBox(0);
}

function focusBox(i) {
  const boxes = document.querySelectorAll(".box");

  if (boxes[i]) {
    boxes[i].focus({ preventScroll: true });
  }
}

function checkAnswer() {
  const boxes = document.querySelectorAll(".box");
  let user = "";
  boxes.forEach(b => user += b.value);

  const correct = puzzleData.answer.replace(/\s/g, "").toUpperCase();

  if (user === correct) {
    boxes.forEach(b => b.classList.add("correct"));
  } else {
    boxes.forEach(b => {
      b.style.animation = "shake 0.3s";
      setTimeout(() => b.style.animation = "", 300);
    });
  }
}

function showHint(type) {
  document.getElementById("hintText").innerText =
    puzzleData.hints[type];

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function startTimer(nextTime) {
  function update() {
    const diff = nextTime - Date.now();

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById("timer").innerText =
      `Nova zagonetka za ${h}h ${m}m ${s}s`;
  }

  update();
  setInterval(update, 1000);
}

loadPuzzle();
