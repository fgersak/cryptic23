/* TIMER LOGIKA */
const INTERVAL = 60 * 60 * 24 * 1000;

function getCurrentPuzzle() {
  const now = Date.now();
  const ref = new Date(2026, 3, 9, 0, 0, 0).getTime();

  const index = Math.floor((now - ref) / INTERVAL) % puzzles.length;

  return {
    puzzle: puzzles[index],
    nextChange: (Math.floor((now - ref) / INTERVAL) + 1) * INTERVAL + ref
  };
}

function loadPuzzle() {
  const data = getCurrentPuzzle();
  puzzleData = data.puzzle;

  document.getElementById("puzzle").innerText = puzzleData.text;

  createGrid(puzzleData.answer);
  startTimer(data.nextChange);
}

/* ✅ ORIGINAL UX */
function createGrid(answer) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  currentIndex = 0;

  for (let i = 0; i < answer.length; i++) {

    if (answer[i] === " ") {
      const spacer = document.createElement("div");
      spacer.style.width = "44px";
      spacer.style.height = "52px";
      grid.appendChild(spacer);
      continue;
    }

    const input = document.createElement("input");
    input.className = "box";
    input.maxLength = 1;

    input.addEventListener("input", (e) => {
      e.target.value = e.target.value.toUpperCase();

      const boxes = document.querySelectorAll(".box");
      const index = Array.from(boxes).indexOf(input);

      if (index < boxes.length - 1) {
        currentIndex = index + 1;
        focusBox(currentIndex);
      }
    });

    input.addEventListener("keydown", (e) => {
      const boxes = document.querySelectorAll(".box");
      const index = Array.from(boxes).indexOf(input);

      if (e.key === "Enter") {
        checkAnswer();
      }

      if (e.key === "Backspace") {
        if (input.value === "") {
          e.preventDefault();

          if (index > 0) {
            boxes[index - 1].value = "";
            currentIndex = index - 1;
            focusBox(currentIndex);
          }
        }
      }
    });

    grid.appendChild(input);
  }

  focusBox(0);
}

function focusBox(i) {
  const boxes = document.querySelectorAll(".box");
  if (boxes[i]) boxes[i].focus();
}

function checkAnswer() {
  const boxes = document.querySelectorAll(".box");

  let user = "";
  boxes.forEach(b => user += b.value);

  const correct = puzzleData.answer.replace(/\s/g, "").toUpperCase();

  if (user === correct) {
    boxes.forEach(b => b.classList.add("correct"));
  } else {
    boxes.forEach(b => {
      b.style.animation = "shake 0.3s";
      setTimeout(() => b.style.animation = "", 300);
    });
  }
}

function showHint(type) {
  document.getElementById("hintText").innerText =
    puzzleData.hints[type];

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function startTimer(nextTime) {
  function update() {
    const diff = nextTime - Date.now();

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById("timer").innerText =
      `Nova zagonetka za ${h}h ${m}m ${s}s`;
  }

  update();
  setInterval(update, 1000);
}

loadPuzzle();
