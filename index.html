<style>
:root {
  --bg: #eaf3ff;
  --text: #111;
  --muted: #6b7280;
  --border: rgba(17,24,39,0.12);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  display: flex;
  font-family: 'Baloo 2', cursive; 

  justify-content: center;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

.container {
  width: 100%;
  max-width: 640px;
  padding: 44px 20px;
  text-align: center;
}

h1 {
  font-size: 36px;
  font-weight: 600;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}

.timer {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 18px;
}

/* 🧩 PUZZLE BOX */
.puzzle {
  font-size: 20px;
  line-height: 1.6;
  font-family: 'Baloo 2', cursive; 

  margin: 24px 0;
  padding: 18px;

  background: #fff;
  border: 2px solid #000;
  border-radius: 14px;
}

/* GRID */
.grid {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
}

.box {
  width: 45px;
  height: 45px;
  font-size: 20px;
  text-align: center;
  text-transform: uppercase;

  font-family: 'Baloo 2', cursive; 

  border: 2px solid var(--border);
  border-color: #5e5e5e;
  border-radius: 10px;

  outline: none;
  background: white;

  transition: all 200ms ease;
}

.box:focus {
  border-color: #111;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
  transform: translateY(-1px);
  
}

/* 🍑 SUCCESS STATE (NEW!) */
.box.correct {
  background: #81fa5cdc;   /* breskvasto-narančasta */
  border-width: 2px;
  border-color: #49792d;
  color: #111;
}

/* BUTTONS */
button {
  margin: 6px;
  padding: 9px 14px;

  font-size: 12px;
  font-weight: 500;
  font-family: 'Baloo 2', cursive; 

  border-color: #111;
  border-width: 1px;
  border-radius: 999px;

  cursor: pointer;
  transition: 150ms;
  color: #111;
}

button:hover {
  transform: translateY(-1px);
}

/* hint colors */
button:nth-of-type(1) {
  background: rgba(100, 180, 254, 0.8);
}
button:nth-of-type(2) {
  background: rgba(250, 204, 21, 0.6);
}
button:nth-of-type(3) {
  background: rgba(236, 72, 154, 0.6);
}
button:nth-of-type(4) {
  background: rgba(144, 254, 100, 0.8);
}
/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
}

.modal-content {
  background: rgba(255,255,255,0.95);
  padding: 18px;
  border-radius: 14px;
  width: 90%;
  max-width: 360px;
}

/* SHAKE */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  50% { transform: translateX(3px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}

const INTERVAL = 6 * 60 * 60 * 1000;

function getCurrentPuzzle() {
  const now = Date.now();
  const ref = new Date(2026, 3, 16, 0, 0, 0).getTime();
  const index = Math.floor((now - ref) / INTERVAL) % 20;

  return {
    puzzleData: puzzles[index],
    nextChange: (Math.floor((now - ref) / INTERVAL) + 1) * INTERVAL + ref
  };
}


async function loadPuzzle() {
  const res = await fetch("http://localhost:3000/api/puzzle");
  const data = await res.json();

  puzzleData = data.puzzle;

  document.getElementById("puzzle").innerText = puzzleData.text;

  createGrid(puzzleData.answer);
  startTimer(data.nextChange);
}

/* GRID WITH SPACES */
function createGrid(answer) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let inputs = [];

  for (let i = 0; i < answer.length; i++) {

    if (answer[i] === " ") {
      const spacer = document.createElement("div");
      spacer.className = "space";
      grid.appendChild(spacer);
      continue;
    }

    const input = document.createElement("input");
    input.className = "box";
    input.maxLength = 1;

    input.addEventListener("input", () => {
      input.value = input.value.toUpperCase();

      const next = inputs[inputs.indexOf(input) + 1];
      if (next) next.focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkAnswer();
    });

    grid.appendChild(input);
    inputs.push(input);
  }

  inputs[0]?.focus();
}

/* 💡 HINTS */
function showHint(type) {
  document.getElementById("hintText").innerText =
    puzzleData.hints[type];

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* 🧠 CHECK ANSWER (UPDATED + SUCCESS COLOR) */
function checkAnswer() {
  const boxes = document.querySelectorAll(".box");

  let user = "";
  boxes.forEach(b => user += b.value);

  const correct = puzzleData.answer.replace(/\s/g, "").toUpperCase();

  if (user === correct) {

    // 🍑 SUCCESS COLOR STATE
    boxes.forEach(b => {
      b.classList.add("correct");
    });

  } else {

    boxes.forEach(b => {
      b.style.animation = "shake 0.3s";
      setTimeout(() => b.style.animation = "", 300);
    });
  }
}

/* ⏱ TIMER */
function startTimer(nextTime) {
  function update() {
    const diff = nextTime - Date.now();

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById("timer").innerText =
      `Nova zagonetka za ${h}h ${m}m ${s}s`;
  }

  update();
  setInterval(update, 1000);
}

loadPuzzle();
